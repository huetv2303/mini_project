
services:
  # PHP App (Backend)
  app:
    build:
      context: ./laravel
      dockerfile: ../docker/php/Dockerfile
      args:
        user: laravel_user
        uid: 1000
    image: laravel-app
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./laravel:/var/www
      - vendor-data:/var/www/vendor
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - laravel-network
    env_file:
      - ./laravel/.env

  # Queue Worker (Xử lý gửi email ngầm)
  worker:
    image: laravel-app
    container_name: laravel-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./laravel:/var/www
      - vendor-data:/var/www/vendor
    depends_on:
      - db
      - app
    networks:
      - laravel-network
    env_file:
      - ./laravel/.env
    command: php artisan queue:work --tries=3

  # React App (Frontend)
  frontend:
    build:
      context: ./fe
      dockerfile: ../docker/react/Dockerfile
    image: react-app
    container_name: react-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./fe:/app
      - /app/node_modules
    networks:
      - laravel-network

  # Nginx Server
  nginx:
    image: nginx:alpine
    container_name: laravel-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./laravel:/var/www
      - vendor-data:/var/www/vendor
      - ./docker/nginx/laravel.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-network
    depends_on:
      - app
      - frontend

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: laravel-db
    restart: unless-stopped
    ports:
      - "33061:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel-network
    env_file:
      - ./laravel/.env

networks:
  laravel-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  vendor-data:
    driver: local
